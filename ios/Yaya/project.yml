name: Yaya
options:
  bundleIdPrefix: com.yaya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.1.0"
  KakaoSDK:
    url: https://github.com/kakao/kakao-ios-sdk
    from: "2.27.2"

targets:
  Yaya:
    type: application
    platform: iOS
    sources:
      - path: Yaya
    settings:
      base:
        INFOPLIST_FILE: Yaya/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yaya.app
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: KakaoSDK
        product: KakaoSDKAuth
      - package: KakaoSDK
        product: KakaoSDKCommon
      - package: KakaoSDK
        product: KakaoSDKUser
    postBuildScripts: []

  YayaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: YayaTests
    dependencies:
      - target: Yaya
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaya.app.tests
        GENERATE_INFOPLIST_FILE: YES

  YayaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: YayaUITests
    dependencies:
      - target: Yaya
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaya.app.uitests
        GENERATE_INFOPLIST_FILE: YES
