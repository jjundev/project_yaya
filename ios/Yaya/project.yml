name: Yaya
options:
  bundleIdPrefix: com.yaya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Yaya:
    type: application
    platform: iOS
    sources:
      - path: Yaya
    settings:
      base:
        INFOPLIST_FILE: Yaya/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yaya.app
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Supabase
        product: Supabase
    postBuildScripts: []

  YayaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: YayaTests
    dependencies:
      - target: Yaya
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaya.app.tests
